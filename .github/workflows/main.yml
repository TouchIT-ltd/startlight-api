name: Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      
          # Add GitHub and server to known hosts
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
          # SSH into server and deploy
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd /home/${{ secrets.SERVER_USER }}/startlight-api &&
            git config --global --add safe.directory /home/${{ secrets.SERVER_USER }}/startlight-api &&
            git pull origin main &&
            sudo docker compose up -d --build &&
            sudo docker compose logs --tail=50
          "
